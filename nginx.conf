server {
    listen 80;
    server_name secureapp.local;
    # Автоматический редирект с HTTP на безопасный HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name secureapp.local;

    # Пути к SSL-сертификатам (например, от Let's Encrypt)
    ssl_certificate /etc/ssl/certs/app.crt;
    ssl_certificate_key /etc/ssl/certs/app.key;

    # Использование только безопасных протоколов TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://go-app-container:8080; # Имя Docker-контейнера с Go
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}